<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMO Analytics — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

    <!-- ── Full-page Loader (auth check) ── -->
    <div class="auth-loader" id="authLoader">
        <div class="auth-loader-inner">
            <div class="loader-logo">
                <div class="logo-icon"><i data-lucide="activity"></i></div>
            </div>
            <div class="loader-spinner"></div>
        </div>
    </div>

    <!-- ── Login Screen ── -->
    <div class="login-screen" id="loginScreen" style="display:none;">
        <div class="login-card">

            <div class="login-header">
                <div class="login-logo">
                    <div class="logo-icon"><i data-lucide="activity"></i></div>
                    <div>
                        <h1 class="login-title">TMO Analytics</h1>
                        <p class="login-subtitle">Painel de Performance Operacional</p>
                    </div>
                </div>
            </div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="login-field">
                    <label for="loginEmail">E-mail</label>
                    <div class="login-input-wrap">
                        <i data-lucide="mail"></i>
                        <input
                            type="email"
                            id="loginEmail"
                            name="email"
                            placeholder="seu@email.com"
                            autocomplete="email"
                            required
                        >
                    </div>
                </div>

                <div class="login-field">
                    <label for="loginPassword">Senha</label>
                    <div class="login-input-wrap">
                        <i data-lucide="lock"></i>
                        <input
                            type="password"
                            id="loginPassword"
                            name="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-pw" id="togglePw" onclick="togglePassword()">
                            <i data-lucide="eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="login-error" id="loginError" style="display:none;">
                    <i data-lucide="alert-circle"></i>
                    <span id="loginErrorMsg"></span>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <i data-lucide="log-in"></i>
                    <span>Entrar</span>
                </button>
            </form>

            <p class="login-footer">Acesso restrito · Use as credenciais fornecidas</p>
        </div>
    </div>

    <!-- Firebase App (compat — needed for v8 API) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase-client.js"></script>
    <script src="auth.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
